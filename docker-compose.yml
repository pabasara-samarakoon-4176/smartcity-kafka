services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:9092"
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD", "bash", "-lc", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
    restart: unless-stopped

  kafdrop:
    image: obsidiandynamics/kafdrop:4.1.0
    container_name: kafdrop
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERCONNECT: "kafka:9092"
      KAFKA_BROKERCONNECT_NAME: "Kafka Cluster"
    ports:
      - "9000:9000"
    networks:
      - kafka-net
    restart: unless-stopped

  spark-master:
    image: apache/spark:4.1.1
    container_name: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8081:8080"
      - "7077:7077"
      - "4040:4040"
    networks:
      - kafka-net
    volumes:
      - ./spark_app:/opt/spark/app
      - ./data/traffic_aggregates:/data/traffic_aggregates
      - ./data/traffic_reports:/data/traffic_reports
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy

  spark-worker-1:
    image: apache/spark:4.1.1
    container_name: spark-worker-1
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_MEMORY: 1g
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8082:8081"
    networks:
      - kafka-net
    volumes:
      - ./spark_app:/opt/spark/app
      - ./data/traffic_aggregates:/data/traffic_aggregates
      - ./data/traffic_reports:/data/traffic_reports
    restart: unless-stopped
    depends_on:
      - spark-master

  postgres:
    image: postgres:14-alpine
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - kafka-net
    volumes:
      - airflow-db:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-init:
    build: 
      context: .
      dockerfile: Dockerfile
    image: smartcity-airflow:2.8.2-custom
    container_name: airflow-init
    entrypoint: /bin/bash
    command: -c "/home/airflow/.local/bin/airflow db migrate && airflow users create --username admin --firstname FIRST --lastname LAST --role Admin --email admin@example.com --password admin"
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=temporary_secret
      - SPARK_HOME=/opt/spark
      - PATH=/home/airflow/.local/bin:/usr/local/bin:/usr/bin:/opt/spark/bin
    networks:
      - kafka-net
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      - postgres

  airflow-webserver:
    build: 
      context: .
      dockerfile: Dockerfile
    image: smartcity-airflow:2.8.2-custom
    container_name: airflow-webserver
    depends_on:
      - postgres
      - airflow-init
      - spark-master
    command: webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=temporary_secret
      - SPARK_HOME=/opt/spark
      - PATH=/home/airflow/.local/bin:/usr/local/bin:/usr/bin:/opt/spark/bin
    ports:
      - "8088:8080" 
    networks:
      - kafka-net
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/data
      - ./spark_dist:/opt/spark
      - ./spark_app:/opt/spark/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 30s
      retries: 5

  airflow-scheduler:
    build: 
      context: .
      dockerfile: Dockerfile
    image: smartcity-airflow:2.8.2-custom
    container_name: airflow-scheduler
    depends_on:
      - postgres
      - airflow-init
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=temporary_secret
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-arm64
      - SPARK_HOME=/opt/spark
      - PATH=/home/airflow/.local/bin:/usr/local/bin:/usr/bin:/opt/spark/bin
    networks:
      - kafka-net
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/data
      - ./spark_dist:/opt/spark
      - ./spark_app:/opt/spark/app
    restart: unless-stopped
  

volumes:
  airflow-db:
    driver: local

networks:
  kafka-net:
    driver: bridge